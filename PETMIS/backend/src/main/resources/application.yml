spring:
  # 数据库配置
  datasource:
    url: jdbc:mysql://192.168.1.21:3306/petims?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: Password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
  
  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath:mappers/**/*.xml
  type-aliases-package: com.petims.model
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: petims-secret-key
  expiration: 86400000 # 24小时

# MinIO配置
minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: petims

# 日志配置
logging:
  level:
    root: info
    com.petims: debug

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always